# cms.helloservice.ua → Directus :8055
server {
    listen 80;
    server_name cms.helloservice.ua;

    client_max_body_size 50M;

    location / {
        proxy_pass http://directus:8055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# n8n.helloservice.ua → n8n :5678
server {
    listen 80;
    server_name n8n.helloservice.ua;

    location / {
        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }
}

# dev.helloservice.ua → placeholder (Next.js — Фаза 2)
server {
    listen 80;
    server_name dev.helloservice.ua;

    location / {
        return 200 'HelloService dev — coming soon';
        add_header Content-Type text/plain;
    }
}

# Default: reject unknown hosts
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
