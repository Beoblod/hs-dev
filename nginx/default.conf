# ── cms.helloservice.ua ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name cms.helloservice.ua;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    server_name cms.helloservice.ua;
    ssl_certificate     /etc/letsencrypt/live/cms.helloservice.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.helloservice.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 50M;
    location / {
        proxy_pass http://directus:8055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── n8n.helloservice.ua ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name n8n.helloservice.ua;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    server_name n8n.helloservice.ua;
    ssl_certificate     /etc/letsencrypt/live/cms.helloservice.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.helloservice.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_http_version 1.1;
    }
}

